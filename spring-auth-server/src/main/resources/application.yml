server:
  port: 9000
  servlet:
    session:
      cookie:
        name: AUTH_SERVER_SESSIONID
        path: /
        http-only: true
        secure: false
        same-site: lax

spring:
  application:
    name: spring-auth-server

# Authorization Server Configuration
auth-server:
  # Issuer URI - this should match your publicly accessible URL
  issuer-uri: http://localhost:9000

  # Development mode settings
  dev-mode:
    enable-direct-login: true

  permissions:
    role-permissions:
      ROLE_USER:
        - read
      ROLE_ADMIN:
        - read
        - write

    # Client-specific permissions (for client_credentials grant type)
    client-permissions:
      resource-server-client:
        - read
        - write
      resource-server-client-symmetric:
        - read
        - write

  # Registered OAuth2 Clients
  clients:
    - client-id: myclient
      client-secret: secret
      redirect-uris:
        - http://localhost:8080/login/oauth2/code/myclient
      scopes:
        - openid
        - profile
        - email
      grant-types:
        - authorization_code
        - refresh_token
      client-authentication-methods: client_secret_basic
      require-consent: false

    - client-id: resource-server-client
      client-secret: secret123
      scopes:
        - openid
        - profile
        - email
      grant-types:
        - client_credentials
      client-authentication-methods:
        - client_secret_post
        - client_secret_basic
        - private_key_jwt
      require-consent: false
      jwks:
        uri: http://localhost:8083/private_key_jwt/jwks
        signing-algorithm: RS256

    - client-id: resource-server-client-symmetric
      client-secret: my-oauth2-client-secret-min-32-chars-here
      scopes:
        - openid
        - profile
        - email
      grant-types:
        - client_credentials
      client-authentication-methods:
        - client_secret_jwt
      require-consent: false
      jwks:
        signing-algorithm: HS256

  # In-memory users (for development only - use a database in production)
  users:
    - username: abc
      password: abc
      roles:
        - USER
    - username: admin
      password: admin
      roles:
        - USER
        - ADMIN

logging:
  level:
    org:
      springframework:
        security: DEBUG
    com:
      ss:
        as: DEBUG
