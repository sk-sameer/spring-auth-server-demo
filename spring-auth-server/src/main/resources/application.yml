server:
  port: 9000
  servlet:
    session:
      cookie:
        name: AUTH_SERVER_SESSIONID
        path: /
        http-only: true
        secure: false
        same-site: lax

spring:
  application:
    name: spring-auth-server

# Authorization Server Configuration
auth-server:
  # Issuer URI - this should match your publicly accessible URL
  issuer-uri: http://localhost:9000

  # Development mode settings
  dev-mode:
    enable-direct-login: true

  # Registered OAuth2 Clients
  clients:
    - client-id: myclient
      client-secret: secret
      redirect-uris:
        - http://localhost:8080/login/oauth2/code/myclient
      scopes:
        - openid
        - profile
        - email
        - user.read
        - user.write
      grant-types:
        - authorization_code
        - refresh_token
      client-authentication-methods: client_secret_basic
      require-consent: false

    - client-id: temp2
      client-secret: secret
      redirect-uris:
        - http://localhost:8084/login/oauth2/code/temp2
      scopes:
        - openid
        - profile
        - email
        - user.read
        - user.write
      grant-types:
        - refresh_token
        - client_credentials
      client-authentication-methods:
        - client_secret_post
        - client_secret_basic
      require-consent: false

  # In-memory users (for development only - use a database in production)
  users:
    - username: abc
      password: abc
      roles:
        - USER
    - username: admin
      password: admin
      roles:
        - USER
        - ADMIN

logging:
  level:
    org:
      springframework:
        security: DEBUG
    com:
      ss:
        as: DEBUG
